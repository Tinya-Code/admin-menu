<div class="max-w-6xl">
  <!-- Header with back button -->
  <div class="flex items-center gap-4 mb-8">
    <button
      type="button"
      class="p-2 -ml-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors"
      (click)="goBack()"
      title="Volver"
    >
      <svg lucideArrowLeft class="w-5 h-5"></svg>
    </button>
    <div>
      <h1 class="text-2xl font-bold text-gray-900">{{ pageTitle() }}</h1>
      <p class="text-sm text-gray-500 mt-1">Administra los banners promocionales</p>
    </div>
  </div>

  <!-- Loading -->
  @if (loading()) {
    <div class="space-y-6 animate-pulse">
      <div class="h-10 bg-gray-200 rounded-lg w-1/3"></div>
      <div class="h-64 bg-gray-100 rounded-xl"></div>
      <div class="h-32 bg-gray-100 rounded-xl"></div>
    </div>
  } @else {
    <form (ngSubmit)="save()" [formGroup]="bannerForm">
      <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
        <!-- ===== LEFT: 3/5 ===== -->
        <div class="lg:col-span-3 space-y-6">
          <!-- Información del Banner -->
          <div>
            <h3 class="text-sm font-semibold text-gray-900 mb-4">Información del Banner</h3>
            <div class="space-y-4">
              <div>
                <label for="banner-title" class="block text-sm font-medium text-gray-700 mb-1"
                  >Título</label
                >
                <input
                  id="banner-title"
                  formControlName="title"
                  placeholder="Título del banner (opcional)"
                  class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent placeholder:text-gray-400"
                />
              </div>
            </div>
          </div>

          <!-- Status -->
          <div class="flex items-center gap-3">
            <button
              type="button"
              role="switch"
              [attr.aria-checked]="bannerForm.get('isActive')?.value"
              aria-label="Cambiar estado del banner"
              class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
              [class.bg-primary]="bannerForm.get('isActive')?.value"
              [class.bg-gray-300]="!bannerForm.get('isActive')?.value"
              (click)="toggleStatus()"
            >
              <span
                class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform shadow-sm"
                [class.translate-x-6]="bannerForm.get('isActive')?.value"
                [class.translate-x-1]="!bannerForm.get('isActive')?.value"
              ></span>
            </button>
            <span class="text-sm text-gray-700">Banner activo</span>
          </div>
        </div>

        <!-- ===== RIGHT: 2/5 ===== -->
        <div class="lg:col-span-2 space-y-6">
          <!-- Imagen -->
          <div>
            <h3 class="text-sm font-semibold text-gray-900 mb-4">Imagen del Banner</h3>
            <app-image-uploader
              [currentUrl]="existingImageUrl()"
              (onFileChange)="onImageChange($event)"
              (onDelete)="onImageDelete($event)"
            />
            <p class="text-xs text-gray-500 mt-2">
              Se recomienda una imagen con relación de aspecto 16:9 (ej. 1920x1080)
            </p>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 mt-8 pt-6 border-t border-gray-200">
        <button
          type="button"
          class="px-4 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
          (click)="goBack()"
        >
          Cancelar
        </button>
        <app-button
          type="submit"
          [loading]="saving()"
          [disabled]="bannerForm.invalid"
        >
          {{ isEditing() ? 'Guardar cambios' : 'Crear banner' }}
        </app-button>
      </div>
    </form>
  }
</div>
